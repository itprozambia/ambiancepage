<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Ambiance of Life Church</title>

  <style>
    :root {
      --primary: #0d1b2a;
      --accent: #e63946;
      --light: #f8f9fa;
      --text: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: var(--light);
      color: var(--text);
    }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 1.5rem;
    }

    header p {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .phone {
      margin-top: 5px;
      font-size: 0.85rem;
    }

    .back-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 8px 15px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 0.85rem;
    }

    /* GALLERY */
    main {
      max-width: 1100px;
      margin: auto;
      padding: 30px 15px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
      background: #000;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s;
    }

    .item:hover img {
      transform: scale(1.1);
      opacity: 0.8;
    }

    .caption {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 0.85rem;
      text-align: center;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      padding: 20px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    .modal img {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 10px;
    }

    .modal-caption {
      color: white;
      margin-top: 10px;
      text-align: center;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

    .nav {
      position: absolute;
      top: 50%;
      font-size: 40px;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    @media(max-width: 600px) {
      .modal img {
        max-height: 60vh;
      }
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: var(--primary);
      color: white;
      margin-top: 20px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Ambiance of Life Church</h1>
    <p>Our Digital Story</p>
    <p class="phone">?? +260 976 564 595</p>
    <a href="index.html" class="back-btn">? Back to Home</a>
  </header>

  <!-- GALLERY -->
  <main>
    <div class="gallery">

      <div class="item">
        <img src="IMAGES/AOLC1.jpg" alt="Pastor Reuben">
        <div class="caption">Pastor Reuben Lubumba</div>
      </div>

      <div class="item">
        <img src="IMAGES/AOLC2.jpg" alt="Pastor Leo">
        <div class="caption">Pastor Leo</div>
      </div>

      <div class="item">
        <img src="IMAGES/AOLC5.jpg" alt="Sister Florence">
        <div class="caption">Sister Florence</div>
      </div>

      <div class="item">
        <img src="IMAGES/AOLC6.jpg" alt="Pastor Marrian">
        <div class="caption">Pastor Ma Marrian Lubumba</div>
      </div>

      <div class="item">
        <img src="IMAGES/AOLC3.jpg" alt="Pastor Sara">
        <div class="caption">Pastor Sara Nyirenda</div>
      </div>

      <div class="item">
        <img src="Images2/M2.jpg" alt="Charles Banda">
        <div class="caption">Prophet Charles Banda</div>
      </div>

      <div class="item">
        <img src="IMAGES/AOLC7.jpg" alt="Transfilldah">
        <div class="caption">Sister Transfilldah K Lubumba</div>
      </div>

    </div>
  </main>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <span class="close">&times;</span>
    <span class="nav prev">&#10094;</span>

    <div>
      <img id="modalImg">
      <div class="modal-caption" id="modalCaption"></div>
    </div>

    <span class="nav next">&#10095;</span>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Ambiance of Life Church
  </footer>

  <!-- SCRIPT -->
  <script>
    const items = document.querySelectorAll(".item");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const caption = document.getElementById("modalCaption");

    const closeBtn = document.querySelector(".close");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");

    let currentIndex = 0;

    function showImage(index) {
      const img = items[index].querySelector("img");
      const text = items[index].querySelector(".caption");

      modalImg.src = img.src;
      caption.textContent = text.textContent;
    }

    items.forEach((item, index) => {
      item.addEventListener("click", () => {
        modal.style.display = "flex";
        currentIndex = index;
        showImage(currentIndex);
      });
    });

    closeBtn.onclick = () => modal.style.display = "none";

    nextBtn.onclick = () => {
      currentIndex = (currentIndex + 1) % items.length;
      showImage(currentIndex);
    };

    prevBtn.onclick = () => {
      currentIndex = (currentIndex - 1 + items.length) % items.length;
      showImage(currentIndex);
    };

    window.onclick = (e) => {
      if (e.target === modal) modal.style.display = "none";
    };
  </script>

</body>
</html>
